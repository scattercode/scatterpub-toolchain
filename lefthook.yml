# Lefthook — git hooks manager. Install with: lefthook install
# (requires the lefthook binary, e.g. `brew install lefthook`).
#
# pre-commit runs Ruff on staged Python files; commit-msg enforces
# Conventional Commits via the shared script in .githooks/.
# Ruff must be available on PATH (e.g. `brew install ruff` or
# `poetry add --group dev ruff`).

pre-commit:
  parallel: true
  commands:
    ruff-lint:
      glob: "*.py"
      run: ruff check {staged_files}
    ruff-format:
      glob: "*.py"
      run: ruff format --check {staged_files}

commit-msg:
  commands:
    conventional:
      run: .githooks/commit-msg {1}
